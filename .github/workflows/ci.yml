name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare environment
        run: cp .env.example .env

      - name: Validate translations
        run: npm run validate:i18n

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        env:
          NODE_ENV: test
        run: npm test -- --ci --coverage --forceExit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  bundle:
    name: Metro bundle (Android)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare environment
        run: cp .env.example .env

      - name: Bundle Android JS
        run: npm run bundle:android

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-js-bundle
          path: |
            /tmp/index.android.bundle
            /tmp/android-assets/
          retention-days: 3

  android:
    name: Android assembleDebug
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare environment
        run: cp .env.example .env

      - name: Placeholder google-services.json (CI only)
        run: |
          cat > android/app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "rnts-ci-placeholder",
              "storage_bucket": "rnts-ci-placeholder.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                "android_client_info": { "package_name": "com.rnts.template" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "CI_PLACEHOLDER_NOT_FOR_PRODUCTION" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          EOF

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Assemble debug APK
        working-directory: android
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError"
        run: >
          ./gradlew assembleDebug --no-daemon --build-cache --max-workers=2
          -PreactNativeArchitectures=arm64-v8a
          -PenableAbiSplits=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
