name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare environment
        run: cp .env.example .env

      - name: Validate translations
        run: npm run validate:i18n

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        env:
          NODE_ENV: test
        run: npm test -- --ci --coverage --forceExit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  bundle-android:
    name: Metro bundle (Android)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare environment
        run: cp .env.example .env

      - name: Bundle Android JS
        run: npm run bundle:android

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-js-bundle
          path: |
            /tmp/index.android.bundle
            /tmp/android-assets/
          retention-days: 3

  bundle-ios:
    name: Metro bundle (iOS)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare environment
        run: cp .env.example .env

      - name: Bundle iOS JS
        run: npm run bundle:ios

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-js-bundle
          path: |
            /tmp/index.ios.bundle
            /tmp/ios-assets/
          retention-days: 3

  android:
    name: Android assembleDebug
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare environment
        run: cp .env.example .env

      - name: Placeholder google-services.json (CI only)
        run: |
          cat > android/app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "rnts-ci-placeholder",
              "storage_bucket": "rnts-ci-placeholder.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                "android_client_info": { "package_name": "com.rnts.template" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "CI_PLACEHOLDER_NOT_FOR_PRODUCTION" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          EOF

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Assemble debug APK
        working-directory: android
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError"
        run: >
          ./gradlew assembleDebug --no-daemon --build-cache --max-workers=2
          -PreactNativeArchitectures=arm64-v8a
          -PenableAbiSplits=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # Native iOS compile requires macOS + Xcode (not available on ubuntu runners).
  # This builds for the iOS Simulator without code signing.
  ios:
    name: iOS build (Simulator)
    runs-on: macos-15
    needs: quality
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare environment
        run: cp .env.example .env

      - name: Placeholder GoogleService-Info.plist (CI only)
        run: |
          cat > ios/RNTS-Template/GoogleService-Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key>
            <string>000000000000-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>com.googleusercontent.apps.000000000000-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</string>
            <key>API_KEY</key>
            <string>CI_PLACEHOLDER_NOT_FOR_PRODUCTION</string>
            <key>GCM_SENDER_ID</key>
            <string>000000000000</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>com.rnts.template</string>
            <key>PROJECT_ID</key>
            <string>rnts-ci-placeholder</string>
            <key>STORAGE_BUCKET</key>
            <string>rnts-ci-placeholder.appspot.com</string>
            <key>IS_ADS_ENABLED</key>
            <false></false>
            <key>IS_ANALYTICS_ENABLED</key>
            <false></false>
            <key>IS_APPINVITE_ENABLED</key>
            <true></true>
            <key>IS_GCM_ENABLED</key>
            <true></true>
            <key>IS_SIGNIN_ENABLED</key>
            <true></true>
            <key>GOOGLE_APP_ID</key>
            <string>1:000000000000:ios:0000000000000000000000</string>
          </dict>
          </plist>
          EOF

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile', 'package-lock.json', 'Gemfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods
        run: bundle exec pod install --project-directory=ios --repo-update

      - name: Resolve Simulator destination
        id: sim
        run: |
          set -euo pipefail
          # Prefer a concrete arm64 simulator on macos-15; fall back to generic.
          xcrun simctl list devices available -j > "$RUNNER_TEMP/simulators.json"
          DEST=$(python3 - "$RUNNER_TEMP/simulators.json" <<'PY'
          import json, sys
          with open(sys.argv[1], encoding="utf-8") as fh:
              data = json.load(fh)
          preferred = ("iPhone 16", "iPhone 16 Pro", "iPhone 15", "iPhone 15 Pro")
          devices = []
          for runtime, items in data.get("devices", {}).items():
              if "iOS" not in runtime:
                  continue
              for d in items:
                  if d.get("isAvailable") and str(d.get("name", "")).startswith("iPhone"):
                      devices.append(d["name"])
          for name in preferred:
              if name in devices:
                  print(f"platform=iOS Simulator,name={name}")
                  raise SystemExit(0)
          if devices:
              print(f"platform=iOS Simulator,name={devices[0]}")
              raise SystemExit(0)
          print("generic/platform=iOS Simulator")
          PY
          )
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"
          echo "Using destination: $DEST"

      - name: Build iOS (Simulator, no signing)
        working-directory: ios
        env:
          NSUnbufferedIO: YES
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace RNTS-Template.xcworkspace \
            -scheme RNTS-Template \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "${{ steps.sim.outputs.destination }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            EXCLUDED_ARCHS=x86_64 \
            build

      - name: Upload iOS app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ${{ runner.temp }}/DerivedData/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 7
          if-no-files-found: warn
